<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPCEN Dashboard - Main</title>
    
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>CDRRMD</h2>
            <p>Operation Center</p>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item active">Dashboard</a>
            <a href="resource.html" class="nav-item">Resource</a>
            <a href="report.html" class="nav-item">Report</a>
            <a href="weather.html" class="nav-item">Weather</a>
        </nav>
    </aside>

    <main class="main-content">
        <div class="container">
            <h1>Live Key Metrics</h1>
            
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">Total Calls</div>
                    <div class="metric-value" id="val-total-calls">0</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Incident Calls</div>
                    <div class="metric-value" id="val-incident-calls">0</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Priority 1 Calls</div>
                    <div class="metric-value" id="val-p1-calls">0</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Priority 2 Calls</div>
                    <div class="metric-value" id="val-p2-calls">0</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Disregarded / N/A</div>
                    <div class="metric-value" id="val-disregarded">0</div>
                </div>
            </div>

            <hr>

            <div class="chart-map-container">
                <div class="panel">
                    <h3>Turn Around Time Trend</h3>
                    <div id="chartDiv"></div>
                </div>
                <div class="panel">
                    <h3>Butuan City Incident Heat Map</h3>
                    <div id="mapDiv"></div>
                </div>
            </div>

            <hr>

            <div class="metrics-grid" style="grid-template-columns: repeat(3, 1fr);">
                <div class="metric-card">
                    <div class="metric-label">Avg Dispatch Time</div>
                    <div class="metric-value" id="val-avg-dispatch">00:00:00</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Avg Run Time</div>
                    <div class="metric-value" id="val-avg-run">00:00:00</div>
                </div>
                <div class="metric-card">
                    <div class="metric-label">Avg Response Time</div>
                    <div class="metric-value" id="val-avg-response">00:00:00</div>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="js/script.js"></script>

</body>
</html>
